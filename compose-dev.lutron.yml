# Lutron HomeWorks/RA2 plugin — DEVELOP-BRANCH BUILD (`:dev` tag).
# Uncomment under `include:` in compose-dev.yml to enable.
services:
  hc-lutron-dev:
    image: ghcr.io/homecore-io/hc-lutron:dev
    container_name: hc-lutron-dev
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: debug
    volumes:
      - ./hc-lutron-data-dev:/homecore
