# WLED LED controller plugin (mDNS discovery).
# Uncomment under `include:` in compose.yml to enable.
#
# Setup:
#   mkdir hc-wled-data    # owner = your user; entrypoint will match
#   docker compose up -d
#   First boot creates ./hc-wled-data/config.toml. Edit, restart.
services:
  hc-wled:
    image: ghcr.io/homecore-io/hc-wled:latest
    container_name: hc-wled
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./hc-wled-data:/homecore
