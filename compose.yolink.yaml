# YoLink plugin (cloud API; host networking for consistency).
# Uncomment under `include:` in compose.yaml to enable.
#
# Setup:
#   mkdir hc-yolink-data    # owner = your user; entrypoint will match
#   docker compose up -d
#   First boot creates ./hc-yolink-data/config.toml. Edit, restart.
services:
  hc-yolink:
    image: ghcr.io/homecore-io/hc-yolink:0.1.0
    container_name: hc-yolink
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./hc-yolink-data:/homecore
