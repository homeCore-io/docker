# YoLink plugin. Uncomment under `include:` in compose.yaml to enable.
#
# Setup:
#   First boot creates ./config/hc-yolink/config.toml. Set your YoLink
#   UAID + secret_key (cloud API credentials).
services:
  hc-yolink:
    image: ghcr.io/homecore-io/hc-yolink:0.1.0
    container_name: hc-yolink
    restart: unless-stopped
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./config/hc-yolink:/etc/homecore
