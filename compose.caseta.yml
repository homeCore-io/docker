# Lutron Caseta plugin (mDNS + LEAP).
# Uncomment under `include:` in compose.yml to enable.
#
# Setup:
#   mkdir hc-caseta-data    # owner = your user; entrypoint will match
#   docker compose up -d
#   First boot creates ./hc-caseta-data/config.toml. Edit, restart.
services:
  hc-caseta:
    image: ghcr.io/homecore-io/hc-caseta:latest
    container_name: hc-caseta
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./hc-caseta-data:/homecore
