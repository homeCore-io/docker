# Z-Wave plugin (driven by zwave-js-server).
# Uncomment under `include:` in compose.yml to enable.
#
# Setup:
#   mkdir hc-zwave-data    # owner = your user; entrypoint will match
#   docker compose up -d
#   First boot creates ./hc-zwave-data/config.toml. Edit, restart.
services:
  hc-zwave:
    image: ghcr.io/homecore-io/hc-zwave:latest
    container_name: hc-zwave
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./hc-zwave-data:/homecore
