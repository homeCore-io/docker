# Philips Hue plugin.
# Uncomment under `include:` in compose.yml to enable.
#
# Setup:
#   mkdir hc-hue-data    # owner = your user; entrypoint will match
#   docker compose up -d
#   First boot creates ./hc-hue-data/config.toml. Edit, restart.
services:
  hc-hue:
    image: ghcr.io/homecore-io/hc-hue:latest
    container_name: hc-hue
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./hc-hue-data:/homecore
