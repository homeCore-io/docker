# Build + push the homeCore appliance image (all-in-one container) to
# ghcr.io/homecore-io/homecore-appliance.
#
# Triggers:
#   - workflow_dispatch       → tags via inputs (use for ad-hoc test builds)
#   - tag push (v*)            → component_tag and appliance_tag both = stripped ref
#   - repository_dispatch     → component-dev-published, fired by each
#                                component's rust-release.yml after a
#                                develop-branch :dev image goes live.
#                                Builds with component_tag=dev,
#                                appliance_tag=dev. Concurrency below
#                                collapses bursts (e.g. SDK fanout
#                                firing all 10 plugins) into a single
#                                build.
#
# Per-component images (hc-core + 10 plugins) are pulled FROM ghcr.io
# at COMPONENT_TAG; binaries are extracted and bundled into a single
# alpine runtime layer. Multi-arch (linux/amd64 + linux/arm64) via the
# component manifests — buildx picks the right arch automatically.

name: Appliance image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      component_tag:
        description: 'Tag of ghcr.io/homecore-io/hc-* component images to bundle'
        required: true
        default: 'latest'
      appliance_tag:
        description: 'Tag for the published appliance image'
        required: true
        default: 'dev'
      fast:
        description: >-
          Skip the linux/arm64 platform to halve runtime. Pass true on
          ad-hoc dev iteration; defaults false so tag pushes always
          publish a multi-arch manifest.
        type: boolean
        required: false
        default: false
  push:
    tags: ['v*']
  repository_dispatch:
    types: [component-dev-published]

# A burst of component pushes (e.g. SDK fanout dispatching 10 plugins)
# would otherwise queue 10 appliance builds against the same :dev tags.
# Coalesce: same group key for every dev cascade; the newer dispatch
# cancels the queued/running older one.
concurrency:
  group: appliance-${{ github.event_name == 'repository_dispatch' && 'dev' || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'repository_dispatch' }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build appliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tags
        id: tags
        run: |
          set -eux
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE="ghcr.io/${OWNER}/homecore-appliance"

          if [ "${{ github.event_name }}" = "push" ]; then
              # Tag push: appliance gets both the immutable version tag AND
              # the rolling :latest tag. Components are pulled from :latest
              # to decouple plugin versioning from appliance/core cadence —
              # the latest plugin build at appliance build time wins.
              VERSION="${GITHUB_REF_NAME#v}"
              COMPONENT_TAG="latest"
              APPLIANCE_TAGS=$(printf '%s\n%s' "${BASE}:${VERSION}" "${BASE}:latest")
              APPLIANCE_VERSION="${VERSION}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
              # Cascade from a component's develop push: always rebuild
              # the rolling :dev tag from :dev components. Triggering
              # component sits in the run name (set below).
              COMPONENT_TAG="dev"
              APPLIANCE_TAGS="${BASE}:dev"
              APPLIANCE_VERSION="dev"
          else
              COMPONENT_TAG="${{ inputs.component_tag }}"
              APPLIANCE_TAGS="${BASE}:${{ inputs.appliance_tag }}"
              APPLIANCE_VERSION="${{ inputs.appliance_tag }}"
          fi
          {
              echo "component_tag=${COMPONENT_TAG}"
              echo "appliance_version=${APPLIANCE_VERSION}"
              echo "owner=${OWNER}"
              echo "appliance_tags<<EOTAGS"
              echo "${APPLIANCE_TAGS}"
              echo "EOTAGS"
          } >> "$GITHUB_OUTPUT"

      # Build /opt/homecore/versions.json — bill-of-materials baked into
      # the appliance image at build time. component_versioning.md Phase A.
      #
      # For each component image at COMPONENT_TAG, resolve to the most
      # specific identifier we can find:
      #   - If COMPONENT_TAG is already SemVer-shaped (X.Y.Z), use as-is.
      #   - Else query ghcr for sibling tags on the same digest and prefer:
      #       1. a SemVer tag (so `:latest` → `0.1.2`)
      #       2. `<tag>@<digest>` (so `:dev` → `dev@sha256:abcd…`).
      #          We pin the digest rather than the mutable `dev-<sha>`
      #          sibling because cleanup-containers.yml may GC dev-<sha>
      #          tags outside its keep-window, leaving versions.json
      #          referencing a 404. The OCI digest is immutable.
      #       3. fallback to COMPONENT_TAG itself
      #
      # Server-side handler: crates/hc-api/src/handlers.rs::system_versions
      # reads this file and exposes via GET /system/versions.
      - name: Build versions.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ steps.tags.outputs.owner }}
          COMPONENT_TAG: ${{ steps.tags.outputs.component_tag }}
          APPLIANCE_VERSION: ${{ steps.tags.outputs.appliance_version }}
        run: |
          set -eu

          # Resolve $1=component, $2=tag → the most specific version we can find.
          resolve_version() {
              local component="$1"
              local tag="$2"
              # Fast path: tag is already a SemVer.
              if echo "$tag" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                  echo "$tag"
                  return
              fi
              # Query versions whose tags include $tag — there should be
              # exactly one. Grab the OCI digest (.name) and the full
              # tags list in one shot.
              local row digest siblings
              row=$(gh api \
                  "/orgs/${OWNER}/packages/container/${component}/versions" \
                  --jq '.[] | select(.metadata.container.tags | index("'"$tag"'")) | "\(.name)|\(.metadata.container.tags|join(","))"' \
                  2>/dev/null | head -1 || true)
              digest="${row%%|*}"
              siblings="${row#*|}"
              # Prefer SemVer when present (e.g. :latest → 0.1.5).
              local semver
              semver=$(echo "$siblings" | tr ',' '\n' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
              if [ -n "$semver" ]; then
                  echo "$semver"
                  return
              fi
              # Else pin the digest. Immutable, survives cleanup of
              # mutable sibling tags. Format: `<tag>@sha256:…`
              if [ -n "$digest" ]; then
                  echo "${tag}@${digest}"
                  return
              fi
              # Last resort: the requested tag itself.
              echo "$tag"
          }

          components="hc-core hc-hue hc-wled hc-yolink hc-lutron hc-sonos hc-isy hc-zwave hc-caseta hc-thermostat hc-ecowitt"

          # Start the JSON with appliance metadata.
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Resolve appliance version too (in case dispatch uses a non-SemVer tag).
          APPLIANCE_RESOLVED=$(resolve_version homecore-appliance "$APPLIANCE_VERSION")
          jq -n \
              --arg appliance "$APPLIANCE_RESOLVED" \
              --arg built_at "$BUILT_AT" \
              '{appliance: $appliance, built_at: $built_at, plugins: {}}' > versions.json

          # Add core + each plugin's resolved version. core lives at top
          # level; plugins live under .plugins.<name>.
          for c in $components; do
              v=$(resolve_version "$c" "$COMPONENT_TAG")
              if [ "$c" = "hc-core" ]; then
                  jq --arg v "$v" '.core = $v' versions.json > versions.json.tmp
              else
                  jq --arg c "$c" --arg v "$v" '.plugins[$c] = $v' versions.json > versions.json.tmp
              fi
              mv versions.json.tmp versions.json
          done

          echo "Built versions.json:"
          cat versions.json

      # FORCE_FAST: `if: false` skips QEMU; revert to `!inputs.fast`.
      - name: Set up QEMU
        if: ${{ false }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push appliance image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/Dockerfile.appliance
          # FORCE_FAST: `true &&` forces amd64-only; revert to `inputs.fast`.
          platforms: ${{ true && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          build-args: |
            COMPONENT_TAG=${{ steps.tags.outputs.component_tag }}
          tags: ${{ steps.tags.outputs.appliance_tags }}
          push: true

      - name: Image summary
        run: |
          {
              echo "## Appliance image"
              echo ""
              echo "Pushed:"
              echo '```'
              echo "${{ steps.tags.outputs.appliance_tags }}"
              echo '```'
              echo "Bundles components @ tag: \`${{ steps.tags.outputs.component_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
