# Lutron HomeWorks/RA2 plugin.
# Uncomment under `include:` in compose.yaml to enable.
#
# Setup:
#   mkdir hc-lutron-data    # owner = your user; entrypoint will match
#   docker compose up -d
#   First boot creates ./hc-lutron-data/config.toml. Edit, restart.
services:
  hc-lutron:
    image: ghcr.io/homecore-io/hc-lutron:0.1.0
    container_name: hc-lutron
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./hc-lutron-data:/homecore
