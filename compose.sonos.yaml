# Sonos plugin (SSDP discovery — host networking required).
# Uncomment under `include:` in compose.yaml to enable.
#
# Setup:
#   mkdir hc-sonos-data    # owner = your user; entrypoint will match
#   docker compose up -d
#   First boot creates ./hc-sonos-data/config.toml. Edit, restart.
services:
  hc-sonos:
    image: ghcr.io/homecore-io/hc-sonos:0.1.0
    container_name: hc-sonos
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./hc-sonos-data:/homecore
