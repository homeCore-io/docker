# homeCore — appliance flavor
#
# Seeded by appliance-entrypoint.sh on first boot into
# <HOMECORE_HOME>/config/homecore.toml. Default HOMECORE_HOME = /homecore,
# so every state path lands under that single bind-mount:
#
#   /homecore/
#     config/homecore.toml          ← this file, after first boot
#     config/<plugin>/config.toml   ← seeded per enabled plugin
#     data/state.redb               ← redb device registry
#     data/history.db               ← SQLite time-series
#     rules/*.ron                   ← user automations
#     ui -> /opt/homecore/ui        ← symlink to baked WASM bundle
#     INITIAL_ADMIN_PASSWORD        ← first-boot admin creds (delete after login)
#     jwt_secret                    ← auto-managed
#     logs/                         ← rolling log files
#
# After first boot, edit through the admin UI; this file is not
# re-applied (operator's edits persist).

[server]
host = "0.0.0.0"
port = 8080

[broker]
# Embedded broker bound to localhost — used by plugins running in the
# same container. To accept external MQTT publishes (Tasmota, Shelly,
# ESPHome on the LAN), change to "0.0.0.0" and add [[broker.clients]].
host = "127.0.0.1"
port = 1883

[location]
# Edit via the admin UI. Placeholders below; sunrise/sunset rules will
# be off until set.
latitude  = 38.9072
longitude = -77.0369
timezone  = "America/New_York"

[battery]
threshold_pct    = 20.0
recover_band_pct = 5.0

[auth]
token_expiry_hours = 24
# First-boot admin password lands at <base_dir>/INITIAL_ADMIN_PASSWORD
# by default. Bind-mount the home dir and `cat appliance-data/INITIAL_ADMIN_PASSWORD`.

[storage]
# Defaults are relative to base_dir:
#   state_db_path   = "data/state.redb"
#   history_db_path = "data/history.db"

[rules]
# dir = "rules" (default, relative to base_dir)

[profiles]
# dir = "config/profiles" (default, relative to base_dir)

# Web admin UI — served at /. The bundle is baked into the image at
# /opt/homecore/ui (immutable, image-internal); we point dist_path at
# it directly so there's no symlink in the operator's bind-mount.
# Same convention as the [[plugins]] binary paths above.
[web_admin]
enabled   = true
dist_path = "/opt/homecore/ui"

[logging]
level = "info"

[logging.stderr]
enabled = true
format  = "pretty"
ansi    = true

[logging.file]
enabled          = true
prefix           = "homecore"
rotation         = "daily"
prune_after_days = 5
format           = "json"

# ---------------------------------------------------------------------------
# Plugins — all bundled, all disabled by default.
#
# Every plugin binary the appliance image ships with is declared here.
# Set `enabled = true` on the ones your hardware actually has, then
# restart the container; hc-core spawns each enabled plugin as a
# managed child process.
#
# The per-plugin config files at config/<plugin>/config.toml are
# seeded on first boot, so each plugin has working defaults the
# moment you enable it. Edit them through the admin UI or directly.
# ---------------------------------------------------------------------------

# `id` here MUST match the plugin's self-registered MQTT plugin_id —
# the value of `plugin_id` in each plugin's own config.toml. Convention
# is `plugin.<name>`. If they don't match, hc-core's spawn-tracking
# entry and the plugin's MQTT-registration entry land in the registry
# under different keys and the UI shows the plugin twice.

[[plugins]]
id      = "plugin.hue"
binary  = "/usr/local/bin/hc-hue"
config  = "config/hc-hue/config.toml"
enabled = false

[[plugins]]
id      = "plugin.wled"
binary  = "/usr/local/bin/hc-wled"
config  = "config/hc-wled/config.toml"
enabled = false

[[plugins]]
id      = "plugin.yolink"
binary  = "/usr/local/bin/hc-yolink"
config  = "config/hc-yolink/config.toml"
enabled = false

[[plugins]]
id      = "plugin.lutron"
binary  = "/usr/local/bin/hc-lutron"
config  = "config/hc-lutron/config.toml"
enabled = false

[[plugins]]
id      = "plugin.sonos"
binary  = "/usr/local/bin/hc-sonos"
config  = "config/hc-sonos/config.toml"
enabled = false

[[plugins]]
id      = "plugin.isy"
binary  = "/usr/local/bin/hc-isy"
config  = "config/hc-isy/config.toml"
enabled = false

[[plugins]]
id      = "plugin.zwave"
binary  = "/usr/local/bin/hc-zwave"
config  = "config/hc-zwave/config.toml"
enabled = false

[[plugins]]
id      = "plugin.caseta"
binary  = "/usr/local/bin/hc-caseta"
config  = "config/hc-caseta/config.toml"
enabled = false

[[plugins]]
id      = "plugin.thermostat"
binary  = "/usr/local/bin/hc-thermostat"
config  = "config/hc-thermostat/config.toml"
enabled = false

[[plugins]]
id      = "plugin.ecowitt"
binary  = "/usr/local/bin/hc-ecowitt"
config  = "config/hc-ecowitt/config.toml"
enabled = false
