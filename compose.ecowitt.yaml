# Ecowitt weather station plugin. Uncomment under `include:` in
# compose.yaml to enable.
#
# Setup:
#   First boot creates ./config/hc-ecowitt/config.toml. The plugin runs an
#   HTTP listener that the Ecowitt console POSTs to — host networking is
#   required so the console (on your LAN) can reach it. Default listen
#   port is configurable in config.toml.
services:
  hc-ecowitt:
    image: ghcr.io/homecore-io/hc-ecowitt:0.1.0
    container_name: hc-ecowitt
    restart: unless-stopped
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./config/hc-ecowitt:/etc/homecore
