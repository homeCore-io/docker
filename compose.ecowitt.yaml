# Ecowitt weather station plugin (HTTP listener; host networking required).
# Uncomment under `include:` in compose.yaml to enable.
#
# Setup:
#   mkdir hc-ecowitt-data    # owner = your user; entrypoint will match
#   docker compose up -d
#   First boot creates ./hc-ecowitt-data/config.toml. Edit, restart.
services:
  hc-ecowitt:
    image: ghcr.io/homecore-io/hc-ecowitt:0.1.0
    container_name: hc-ecowitt
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./hc-ecowitt-data:/homecore
