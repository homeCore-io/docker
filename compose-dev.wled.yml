# WLED LED controller plugin — DEVELOP-BRANCH BUILD (`:dev` tag).
# Uncomment under `include:` in compose-dev.yml to enable.
services:
  hc-wled-dev:
    image: ghcr.io/homecore-io/hc-wled:dev
    container_name: hc-wled-dev
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: debug
    volumes:
      - ./hc-wled-data-dev:/homecore
