# =============================================================================
# homeCore — multi-container compose
#
# This is the BASE file. It runs only hc-core (with the embedded MQTT broker).
# Add plugins by uncommenting them in the `include:` block below.
#
# Quick start:
#   1. Uncomment the plugins you want under `include:`.
#   2. mkdir homecore-data && (optionally chown $(id -u):$(id -g) homecore-data)
#   3. docker compose up -d
#   4. cat homecore-data/INITIAL_ADMIN_PASSWORD       (first-boot creds)
#   5. http://<host-ip>:8080                          (web admin UI)
#   6. docker compose restart                          (after editing configs)
#
# Single-bind-mount layout per service. Each container bind-mounts ONE host
# directory to /homecore; the entrypoint detects the owner and drops
# privileges to that user before writing anything. So `mkdir homecore-data`
# as your user is enough — no env vars or pre-chown ritual needed.
#
# Web UI:    http://localhost:8080
# Broker:    127.0.0.1:1883 (host network — plugins reach it directly)
#
# All services use `network_mode: host` — required for mDNS/SSDP discovery
# and for IoT devices on the LAN to reach the embedded broker.
#
# This file tracks the `:latest` tag (most recent stable release). For the
# bleeding-edge develop-branch builds, use compose-dev.yml instead.
# =============================================================================

include:
  # - compose.hue.yml
  # - compose.sonos.yml
  # - compose.yolink.yml
  # - compose.lutron.yml
  # - compose.wled.yml
  # - compose.isy.yml
  # - compose.zwave.yml
  # - compose.caseta.yml
  # - compose.thermostat.yml
  # - compose.ecowitt.yml

services:
  homecore:
    image: ghcr.io/homecore-io/hc-core:latest
    container_name: homecore
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      # Single bind-mount: everything mutable lives under /homecore.
      # First boot seeds config/, data/, rules/ here. INITIAL_ADMIN_PASSWORD
      # lands at the root.
      - ./homecore-data:/homecore
