# Universal Devices ISY plugin.
# Uncomment under `include:` in compose.yaml to enable.
#
# Setup:
#   mkdir hc-isy-data    # owner = your user; entrypoint will match
#   docker compose up -d
#   First boot creates ./hc-isy-data/config.toml. Edit, restart.
services:
  hc-isy:
    image: ghcr.io/homecore-io/hc-isy:0.1.0
    container_name: hc-isy
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: info
    volumes:
      - ./hc-isy-data:/homecore
