# Universal Devices ISY plugin — DEVELOP-BRANCH BUILD (`:dev` tag).
# Uncomment under `include:` in compose-dev.yml to enable.
services:
  hc-isy-dev:
    image: ghcr.io/homecore-io/hc-isy:dev
    container_name: hc-isy-dev
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: debug
    volumes:
      - ./hc-isy-data-dev:/homecore
