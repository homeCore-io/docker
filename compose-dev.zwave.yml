# Z-Wave plugin — DEVELOP-BRANCH BUILD (`:dev` tag).
# Uncomment under `include:` in compose-dev.yml to enable.
services:
  hc-zwave-dev:
    image: ghcr.io/homecore-io/hc-zwave:dev
    container_name: hc-zwave-dev
    restart: unless-stopped
    pull_policy: always
    network_mode: host
    environment:
      RUST_LOG: debug
    volumes:
      - ./hc-zwave-data-dev:/homecore
